name: Process map contributions

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-contribution:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, '## Map Contribution')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract contribution details
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node -e "
            const body = process.env.ISSUE_BODY;

            // Extract type
            const typeMatch = body.match(/\*\*Type:\*\*\s*(\w+)/);
            const type = typeMatch ? typeMatch[1] : null;

            // Extract site
            const siteMatch = body.match(/\*\*Site:\*\*\s*(\w+)/);
            const site = siteMatch ? siteMatch[1] : 'college';

            // Extract category
            const catMatch = body.match(/\*\*Category:\*\*\s*(\w+)/);
            const category = catMatch ? catMatch[1] : 'other';

            // Extract file path
            const fileMatch = body.match(/\*\*File:\*\*\s*\x60([^\x6]+)\x60/);
            const filePath = fileMatch ? fileMatch[1] : null;

            // Extract JSON from code block
            const jsonMatch = body.match(/\x60\x60\x60json\n([\s\S]*?)\n\x60\x60\x60/);
            if (!jsonMatch) {
              console.log('error=No JSON found in issue body');
              process.exit(0);
            }

            let data;
            try {
              data = JSON.parse(jsonMatch[1]);
            } catch(e) {
              console.log('error=Invalid JSON: ' + e.message);
              process.exit(0);
            }

            console.log('type=' + type);
            console.log('site=' + site);
            console.log('category=' + category);
            console.log('filePath=' + (filePath || ''));
            console.log('data=' + JSON.stringify(data));
            console.log('name=' + (data.name || 'Unnamed'));
            console.log('id=' + (data.id || ''));
          " | while IFS='=' read -r key value; do
            echo "$key=$value" >> $GITHUB_OUTPUT
          done

      - name: Validate and add to data/
        if: steps.parse.outputs.type != ''
        id: add
        env:
          TYPE: ${{ steps.parse.outputs.type }}
          SITE: ${{ steps.parse.outputs.site }}
          CATEGORY: ${{ steps.parse.outputs.category }}
          FILE_PATH: ${{ steps.parse.outputs.filePath }}
          DATA: ${{ steps.parse.outputs.data }}
          ITEM_NAME: ${{ steps.parse.outputs.name }}
          ITEM_ID: ${{ steps.parse.outputs.id }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const type = process.env.TYPE;
            const site = process.env.SITE || 'college';
            const category = process.env.CATEGORY || 'other';
            const filePath = process.env.FILE_PATH;
            const data = JSON.parse(process.env.DATA);
            const itemName = process.env.ITEM_NAME || 'Unnamed';
            const itemId = process.env.ITEM_ID;

            if (!type || !['building','landmark','path'].includes(type)) {
              console.log('error=Invalid type: ' + type);
              process.exit(1);
            }

            // Determine target file
            let targetFile;
            if (filePath) {
              targetFile = filePath;
            } else if (type === 'building') {
              targetFile = 'data/' + site + '/buildings/' + category + '.json';
            } else if (type === 'landmark') {
              targetFile = 'data/' + site + '/landmarks.json';
            } else {
              targetFile = 'data/' + site + '/paths.json';
            }

            // Read existing array (or create empty)
            let items = [];
            if (fs.existsSync(targetFile)) {
              items = JSON.parse(fs.readFileSync(targetFile, 'utf8'));
            }

            // Check for duplicate id
            if (itemId && items.some(i => i.id === itemId)) {
              console.log('warning=Item with id ' + itemId + ' already exists in ' + targetFile);
            }

            // Add the item
            items.push(data);
            fs.mkdirSync(path.dirname(targetFile), { recursive: true });
            fs.writeFileSync(targetFile, JSON.stringify(items, null, 2) + '\n');

            console.log('targetFile=' + targetFile);
            console.log('itemName=' + itemName);
            console.log('count=' + items.length);
            console.log('success=true');
          "

      - name: Create PR
        if: steps.add.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE: ${{ steps.parse.outputs.site }}
          CATEGORY: ${{ steps.parse.outputs.category }}
          TYPE: ${{ steps.parse.outputs.type }}
          ITEM_NAME: ${{ steps.parse.outputs.name }}
          TARGET_FILE: ${{ steps.add.outputs.targetFile }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="contribution/${{ steps.parse.outputs.type }}/${{ steps.parse.outputs.name }}"
          BRANCH=$(echo "$BRANCH" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]//g' | cut -c1-50)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$TARGET_FILE"
          git commit -m "Add $TYPE: $ITEM_NAME ($SITE)"
          git push origin "$BRANCH"

          gh pr create \
            --title "Add $TYPE: $ITEM_NAME" \
            --body "Automated PR from issue #${ISSUE_NUMBER}.

          Adds **$ITEM_NAME** to \`$TARGET_FILE\`.

          Closes #${ISSUE_NUMBER}" \
            --head "$BRANCH" \
            --base main

      - name: Comment on issue
        if: steps.add.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ITEM_NAME: ${{ steps.parse.outputs.name }}
          TYPE: ${{ steps.parse.outputs.type }}
          TARGET_FILE: ${{ steps.add.outputs.targetFile }}
        run: |
          BRANCH="contribution/${{ steps.parse.outputs.type }}/${{ steps.parse.outputs.name }}"
          BRANCH=$(echo "$BRANCH" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]//g' | cut -c1-50)

          gh issue comment $ISSUE_NUMBER --body "✅ **Contribution processed!**

          - **Item:** $ITEM_NAME ($TYPE)
          - **File:** \`$TARGET_FILE\`
          - **Branch:** \`$BRANCH\`

          A pull request has been created automatically. Maintainer will review and merge."

      - name: Comment on error
        if: failure() || (steps.parse.outputs.type != '' && steps.add.outputs.success != 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "❌ **Could not process this contribution.**

          The JSON might be invalid or missing required fields. A maintainer will take a look."
