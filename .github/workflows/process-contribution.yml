name: Process map contributions

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-contribution:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, '## Map Contribution')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Process contribution and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const body = process.env.ISSUE_BODY;
          const issueNum = process.env.ISSUE_NUMBER;

          // --- Parse the issue body ---
          const typeMatch = body.match(/\*\*Type:\*\*\s*(\w+)/);
          const siteMatch = body.match(/\*\*Site:\*\*\s*(\w+)/);
          const catMatch = body.match(/\*\*Category:\*\*\s*(\w+)/);
          const fileMatch = body.match(/\*\*File:\*\*\s*`([^`]+)`/);
          const jsonMatch = body.match(/```json\n([\s\S]*?)\n```/);

          const type = typeMatch ? typeMatch[1] : null;
          const site = siteMatch ? siteMatch[1] : 'college';
          const category = catMatch ? catMatch[1] : 'other';
          const filePath = fileMatch ? fileMatch[1] : null;

          if (!type || !['building','landmark','path'].includes(type)) {
            console.log('Invalid or missing type: ' + type);
            comment('❌ **Could not process this contribution.** Invalid or missing type: `' + (type || 'none') + '`.');
            process.exit(0);
          }

          if (!jsonMatch) {
            console.log('No JSON found in issue body');
            comment('❌ **Could not process this contribution.** No JSON code block found.');
            process.exit(0);
          }

          let data;
          try {
            data = JSON.parse(jsonMatch[1]);
          } catch(e) {
            console.log('Invalid JSON: ' + e.message);
            comment('❌ **Could not process this contribution.** Invalid JSON: ' + e.message);
            process.exit(0);
          }

          // --- Determine target file ---
          let targetFile;
          if (filePath) {
            targetFile = filePath;
          } else if (type === 'building') {
            targetFile = 'data/' + site + '/buildings/' + category + '.json';
          } else if (type === 'landmark') {
            targetFile = 'data/' + site + '/landmarks.json';
          } else {
            targetFile = 'data/' + site + '/paths.json';
          }

          // --- Read existing array (or create empty) ---
          let items = [];
          if (fs.existsSync(targetFile)) {
            try {
              items = JSON.parse(fs.readFileSync(targetFile, 'utf8'));
            } catch(e) {
              items = [];
            }
          }

          // --- Add the item ---
          items.push(data);
          fs.mkdirSync(require('path').dirname(targetFile), { recursive: true });
          fs.writeFileSync(targetFile, JSON.stringify(items, null, 2) + '\n');

          // --- Create branch and PR ---
          const itemName = data.name || 'Unnamed';
          let branch = 'contribution/' + type + '/' + itemName;
          branch = branch.toLowerCase().replace(/[^a-z0-9._-]/g, '-').replace(/-+/g, '-').substring(0, 50);

          const cwd = { cwd: process.cwd(), encoding: 'utf8' };
          execSync('git config user.name "github-actions[bot]"', cwd);
          execSync('git config user.email "github-actions[bot]@users.noreply.github.com"', cwd);
          execSync('git checkout -b ' + branch, cwd);
          execSync('git add ' + targetFile, cwd);
          execSync('git commit -m "Add ' + type + ': ' + itemName + ' (' + site + ')"', cwd);
          execSync('git push origin ' + branch, cwd);

          execSync('gh pr create --title "Add ' + type + ': ' + itemName + '" ' +
            '--body "Automated PR from issue #' + issueNum + '.\n\n' +
            'Adds **' + itemName + '** to `' + targetFile + '`.\n\nCloses #' + issueNum + '" ' +
            '--head ' + branch + ' --base main', cwd);

          comment('✅ **Contribution processed!**\n\n' +
            '- **Item:** ' + itemName + ' (' + type + ')\n' +
            '- **File:** `' + targetFile + '`\n' +
            '- **Branch:** `' + branch + '`\n\n' +
            'A pull request has been created automatically. Maintainer will review and merge.');

          function comment(msg) {
            try {
              execSync('gh issue comment ' + issueNum + ' --body "' +
                msg.replace(/"/g, '\\"').replace(/\n/g, '\\n') + '"', cwd);
            } catch(e) { console.log('Failed to comment: ' + e.message); }
          }
          SCRIPT
