name: Contribute

on:
  issues:
    types: [opened]

jobs:
  add:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.issue.body, '## Map Contribution') }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: echo "Checked out"
