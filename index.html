<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Campus Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>
  <!-- Sidebar Menu Button -->
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menu"><i class="fas fa-bars"></i></button>

  <!-- Main Sidebar -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Campus Mapper</h2>
      <button id="close-btn" class="close-btn" aria-label="Close">&times;</button>
    </div>
    <div class="sidebar-content">
      <!-- Search -->
      <div class="search-box">
        <div class="search-input-wrap">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="search-input" placeholder="Search...">
          <button id="clear-search" class="clear-btn" aria-label="Clear">&times;</button>
        </div>
      </div>
      <div id="search-results" class="search-results"></div>
      <div class="sidebar-divider"></div>
      <!-- Main Menu -->
      <div id="main-menu">
        <button class="menu-item" data-target="college-view">
          <i class="fas fa-university menu-icon"></i><span class="menu-label">College</span><span class="menu-chevron"></span>
        </button>
        <button class="menu-item" data-target="hostel-view">
          <i class="fas fa-bed menu-icon"></i><span class="menu-label">Hostel</span><span class="menu-chevron"></span>
        </button>
        <div class="menu-divider"></div>
        <button class="menu-item" data-target="landmarks-box">
          <i class="fas fa-landmark menu-icon"></i><span class="menu-label">Landmarks</span><span class="menu-chevron"></span>
        </button>
        <div class="menu-divider"></div>
        <!-- Add Landmark Button -->
        <button id="add-landmark-btn" class="menu-item menu-item-edit" data-action="add-landmark">
          <i class="fas fa-map-pin menu-icon"></i><span class="menu-label">Add Landmark</span><span class="menu-badge">+</span>
        </button>
        <!-- Add/Edit Entry Points -->
        <button id="add-entry-point-btn" class="menu-item menu-item-edit" data-action="add-entry-point">
          <i class="fas fa-door-open menu-icon"></i><span class="menu-label">Add/Edit Entry Points</span><span class="menu-badge">+</span>
        </button>
        <!-- Edit Paths -->
        <button id="edit-paths-btn" class="menu-item menu-item-edit" data-action="edit-paths">
          <i class="fas fa-route menu-icon"></i><span class="menu-label">Edit Paths</span><span class="menu-badge">+</span>
        </button>
      </div>
      <!-- Sub Menus (Default Hidden) -->
      <div id="college-view" class="sub-menu" style="display:none;"></div>
      <div id="hostel-view" class="sub-menu" style="display:none;"></div>
      <!-- Landmarks Box (Default Hidden) -->
      <div id="landmarks-box" class="sub-menu" style="display:none;"></div>
    </div>
  </div>

  <!-- Entry Point Actions -->
  <div id="entryActions" class="edit-toolbar" style="display:none;">
    <button id="saveEntryBtn"><i class="fas fa-check"></i> Save</button>
    <button id="cancelEntryBtn"><i class="fas fa-times"></i> Cancel</button>
  </div>

  <!-- Path Edit Actions -->
  <div id="pathActions" class="edit-toolbar" style="display:none;">
    <button id="undoPathBtn"><i class="fas fa-undo"></i> Undo</button>
    <button id="savePathBtn"><i class="fas fa-check"></i> Save</button>
    <button id="cancelPathBtn"><i class="fas fa-times"></i> Cancel</button>
  </div>

  <!-- Landmark Placement Actions -->
  <div id="landmarkPlaceActions" class="edit-toolbar" style="display:none;">
    <button id="saveLandmarkBtn"><i class="fas fa-check"></i> Save</button>
    <button id="cancelLandmarkBtn"><i class="fas fa-times"></i> Cancel</button>
  </div>

  <!-- Building Click Actions -->
  <div id="buildingActions" class="edit-toolbar" style="display:none;">
    <button id="addEntryToBuildingBtn"><i class="fas fa-plus"></i> Add Entry Point</button>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
  <script src="mapData.js"></script>
  <script src="app.js"></script>
</body>
</html>
